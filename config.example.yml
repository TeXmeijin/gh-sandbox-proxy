# gh-sandbox-proxy config
#
# Copy to:
#   ~/.config/gh-sandbox-proxy/config.yml
#
# Or point the wrapper at it:
#   export GH_SANDBOX_CONFIG=/path/to/config.yml

# Local image built from Dockerfile in this repository.
image: gh-sandbox-proxy:latest

# Fallback max lifetime for one authenticated sandbox container.
ttl: 1h

# Optional daily active window. When enabled, a sandbox created inside this
# window is kept until the window end instead of expiring after `ttl`.
active_window_enabled: false
active_window_timezone: Asia/Tokyo
active_window_start: "10:00"
active_window_end: "19:00"

# Authentication config is stored in container tmpfs and disappears when the
# sandbox exits. The sandbox exits automatically at the configured expiry.
auth_storage: tmpfs
auth_tmpfs_size: 16m

# Mount stable workspace ancestors instead of remounting each repository. This
# lets repo-aware gh commands see .git without recreating the sandbox on cd.
workspace_mounts:
  # - ~/ghq
  # - ~/Documents/src

# Optional profile-based setup. Profiles are selected by GH_SANDBOX_PROFILE or
# by the deepest matching path under match_paths. Keep mounts aligned with the
# GitHub owner/org boundary that the token is allowed to access.
profiles:
  personal:
    match_paths:
      - ~/ghq/github.com/your-user
    workspace_mounts:
      - ~/ghq/github.com/your-user
    token_provider: 1password
    token_ref: op://Private/github-personal-gh-token/token

  sidejob:
    match_paths:
      - ~/ghq/github.com/example-sidejob-org
    workspace_mounts:
      - ~/ghq/github.com/example-sidejob-org
    token_provider: 1password
    token_ref: op://Private/github-sidejob-gh-token/token

# Container name is suffixed with the current host user.
container_name: gh-sandbox-proxy

# If a proxied command needs auth and the sandbox is not authenticated, run
# `gh auth login --web` inside the container.
auto_auth: true
auth_hostname: github.com

# These commands never pass through to container gh because they print tokens.
blocked:
  - ["auth", "token"]
  - ["auth", "status", "--show-token"]

# Commands that should not trigger auto-login before running.
no_auth_commands:
  - ["--help"]
  - ["help"]
  - ["--version"]
  - ["version"]
  - ["completion"]
  - ["sandbox"]
  - ["auth", "login"]
  - ["auth", "logout"]
  - ["auth", "status"]
